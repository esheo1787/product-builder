<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ff;
    --surface: #fff;
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --text: #2d2d2d;
    --text-light: #888;
    --shadow: 0 4px 24px rgba(108, 92, 231, 0.1);
    --shadow-lg: 0 8px 40px rgba(108, 92, 231, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header-emoji {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2rem, 7vw, 3rem);
    color: var(--primary);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 0.95rem;
    color: var(--text-light);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    max-width: 640px;
    width: 100%;
  }

  .card {
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 40px 28px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
  }
  .card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .card .card-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 16px;
  }
  .card .card-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }
  .card .card-desc {
    font-size: 0.9rem;
    color: var(--text-light);
    line-height: 1.6;
  }

  .card-lunch { border-bottom: 4px solid #ff6b35; }
  .card-lunch:hover { border-bottom-color: #ff8c5a; }
  .card-lunch .card-title { color: #ff6b35; }

  .card-lotto { border-bottom: 4px solid #f1c40f; }
  .card-lotto:hover { border-bottom-color: #f9d923; }
  .card-lotto .card-title { color: #e67e22; }

  .card-profile { border-bottom: 4px solid #764ba2; }
  .card-profile:hover { border-bottom-color: #a29bfe; }
  .card-profile .card-title { color: #764ba2; }

  .footer {
    margin-top: 48px;
    font-size: 0.75rem;
    color: #bbb;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">🚀</span>
  <h1>Product Builder</h1>
  <p class="subtitle">재미있는 미니 프로젝트 모음</p>
</div>

<div class="cards">
  <a class="card card-lunch" href="./lunch/">
    <span class="card-emoji">🍽️</span>
    <div class="card-title">점심메뉴 추천</div>
    <div class="card-desc">오늘 뭐 먹지? 기분과 상황에 맞는 메뉴를 추천해드려요</div>
  </a>

  <a class="card card-lotto" href="./lotto/">
    <span class="card-emoji">🎱</span>
    <div class="card-title">로또 번호 생성</div>
    <div class="card-desc">행운의 로또 번호를 뽑아보세요!</div>
  </a>

  <a class="card card-profile" href="./psa/">
    <span class="card-emoji">🧠</span>
    <div class="card-title">프사 인상 리포트</div>
    <div class="card-desc">남들이 보는 내 프사 첫인상은? AI처럼 분석해드려요</div>
  </a>
</div>

<div class="footer">Product Builder &copy; 2025</div>

</body>
</html>
