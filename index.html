<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --text: #1a1a1a;
      --header-bg: #ffffff;
      --header-border: #e0e0e0;
      --card-bg: #ffffff;
      --card-shadow: rgba(0, 0, 0, 0.08);
      --btn-bg: #4a6cf7;
      --btn-hover: #3a5ce5;
      --btn-text: #ffffff;
      --history-bg: #f8f9fa;
      --history-border: #e9ecef;
      --empty-ball: #d0d0d0;
      --separator-color: #999;
      --transition: 0.3s ease;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --text: #e0e0e0;
      --header-bg: #1e1e1e;
      --header-border: #333333;
      --card-bg: #1e1e1e;
      --card-shadow: rgba(0, 0, 0, 0.3);
      --btn-bg: #5b7bf9;
      --btn-hover: #4a6cf7;
      --btn-text: #ffffff;
      --history-bg: #2a2a2a;
      --history-border: #333;
      --empty-ball: #444;
      --separator-color: #777;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color var(--transition), color var(--transition);
      min-height: 100vh;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      transition: background-color var(--transition), border-color var(--transition);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    #theme-toggle {
      position: relative;
      width: 44px; height: 44px;
      border: 2px solid var(--header-border);
      border-radius: 50%;
      background: var(--card-bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      transition: background-color var(--transition), border-color var(--transition), transform 0.2s ease;
    }
    #theme-toggle:hover { transform: scale(1.1); }
    .icon-sun, .icon-moon {
      position: absolute;
      transition: opacity var(--transition), transform var(--transition);
    }
    .icon-sun { opacity: 1; transform: rotate(0deg); }
    .icon-moon { opacity: 0; transform: rotate(-90deg); }
    [data-theme="dark"] .icon-sun { opacity: 0; transform: rotate(90deg); }
    [data-theme="dark"] .icon-moon { opacity: 1; transform: rotate(0deg); }
    main { display: flex; justify-content: center; padding: 2rem 1rem; }
    .lotto-card {
      text-align: center;
      padding: 2.5rem 2rem;
      background-color: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 4px 24px var(--card-shadow);
      max-width: 520px; width: 100%;
      transition: background-color var(--transition), box-shadow var(--transition);
    }
    .lotto-card h2 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .number-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; flex-wrap: wrap; margin-bottom: 2rem;
    }
    .ball {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: #fff;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }
    .ball.empty { background-color: var(--empty-ball); color: var(--text); font-weight: 400; }
    .ball.pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .ball.range-1 { background: #fbc400; }
    .ball.range-10 { background: #69c8f2; }
    .ball.range-20 { background: #ff7272; }
    .ball.range-30 { background: #aaa; }
    .ball.range-40 { background: #b0d840; }
    .bonus-separator { font-size: 1.5rem; font-weight: 700; color: var(--separator-color); margin: 0 4px; }
    .ball.bonus { border: 3px dashed var(--separator-color); }
    .ball.bonus:not(.empty) { border: none; }
    .generate-btn {
      padding: 14px 40px; font-size: 1.1rem; font-weight: 600;
      border: none; border-radius: 12px;
      background-color: var(--btn-bg); color: var(--btn-text);
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }
    .generate-btn:hover { background-color: var(--btn-hover); transform: translateY(-2px); }
    .generate-btn:active { transform: translateY(0); }
    .history { margin-top: 2rem; display: none; }
    .history.visible { display: block; }
    .history h3 { font-size: 1rem; margin-bottom: 0.75rem; opacity: 0.7; }
    #history-list { list-style: none; max-height: 200px; overflow-y: auto; }
    #history-list li {
      padding: 10px 14px; margin-bottom: 6px;
      background-color: var(--history-bg); border: 1px solid var(--history-border);
      border-radius: 10px; font-size: 0.95rem; font-weight: 500;
      font-variant-numeric: tabular-nums;
      transition: background-color var(--transition), border-color var(--transition);
    }
    @media (max-width: 480px) {
      .ball { width: 44px; height: 44px; font-size: 1rem; }
      .lotto-card { padding: 2rem 1.2rem; }
      header { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>로또 번호 생성기</h1>
    <button id="theme-toggle" aria-label="테마 전환">
      <span class="icon-sun">&#9728;</span>
      <span class="icon-moon">&#9790;</span>
    </button>
  </header>
  <main>
    <section class="lotto-card">
      <h2>이번 주 행운의 번호는?</h2>
      <div id="lotto-numbers" class="number-row">
        <div class="ball empty">?</div>
        <div class="ball empty">?</div>
        <div class="ball empty">?</div>
        <div class="ball empty">?</div>
        <div class="ball empty">?</div>
        <div class="ball empty">?</div>
        <div class="bonus-separator">+</div>
        <div class="ball empty bonus">?</div>
      </div>
      <button id="generate-btn" class="generate-btn">번호 생성</button>
      <div id="history" class="history">
        <h3>생성 기록</h3>
        <ul id="history-list"></ul>
      </div>
    </section>
  </main>
  <script>
    var toggle = document.getElementById("theme-toggle");
    var STORAGE_KEY = "theme";
    function getPreferredTheme() {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return saved;
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(STORAGE_KEY, theme);
    }
    applyTheme(getPreferredTheme());
    toggle.addEventListener("click", function () {
      var current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    });

    var generateBtn = document.getElementById("generate-btn");
    var numbersContainer = document.getElementById("lotto-numbers");
    var historySection = document.getElementById("history");
    var historyList = document.getElementById("history-list");
    function getRandomNumbers() {
      var pool = [];
      for (var i = 1; i <= 45; i++) pool.push(i);
      var picked = [];
      for (var i = 0; i < 7; i++) {
        var idx = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(idx, 1)[0]);
      }
      var main = picked.slice(0, 6).sort(function (a, b) { return a - b; });
      return { main: main, bonus: picked[6] };
    }
    function getRangeClass(num) {
      if (num <= 10) return "range-1";
      if (num <= 20) return "range-10";
      if (num <= 30) return "range-20";
      if (num <= 40) return "range-30";
      return "range-40";
    }
    function renderNumbers(result) {
      numbersContainer.innerHTML = "";
      result.main.forEach(function (num, i) {
        var ball = document.createElement("div");
        ball.className = "ball pop " + getRangeClass(num);
        ball.textContent = num;
        ball.style.animationDelay = (i * 0.1) + "s";
        numbersContainer.appendChild(ball);
      });
      var sep = document.createElement("div");
      sep.className = "bonus-separator";
      sep.textContent = "+";
      numbersContainer.appendChild(sep);
      var bonusBall = document.createElement("div");
      bonusBall.className = "ball pop bonus " + getRangeClass(result.bonus);
      bonusBall.textContent = result.bonus;
      bonusBall.style.animationDelay = "0.7s";
      numbersContainer.appendChild(bonusBall);
    }
    function addToHistory(result) {
      historySection.classList.add("visible");
      var li = document.createElement("li");
      var mainText = result.main.map(function (n) {
        return String(n).padStart(2, "0");
      }).join("  ");
      li.textContent = mainText + "  + " + String(result.bonus).padStart(2, "0");
      historyList.insertBefore(li, historyList.firstChild);
      if (historyList.children.length > 10) historyList.removeChild(historyList.lastChild);
    }
    generateBtn.addEventListener("click", function () {
      var result = getRandomNumbers();
      renderNumbers(result);
      addToHistory(result);
    });
  </script>
</body>
</html>
