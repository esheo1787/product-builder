<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 프사, 남들이 보는 첫인상</title>
<meta name="description" content="프로필 사진 인상 분석기 - 남들이 보는 내 첫인상은?">
<meta property="og:title" content="내 프사, 남들이 보는 첫인상">
<meta property="og:description" content="프사만으로 알 수 있는 나의 인상 리포트">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0a0a1a;
  --bg2: #1a1030;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.08);
  --primary: #667eea;
  --primary2: #764ba2;
  --accent: #f093fb;
  --text: #ffffff;
  --text-dim: #8888aa;
  --green: #2ecc71;
  --blue: #3498db;
  --orange: #f39c12;
  --red: #e74c3c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background: linear-gradient(135deg, var(--bg1), var(--bg2), #0a1a2a);
  background-size: 400% 400%;
  animation: bgShift 20s ease infinite;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
@keyframes bgShift {
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

/* Screens */
.screen {
  position: fixed; inset:0;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center;
  padding: 24px 20px;
  opacity:0; pointer-events:none;
  transition: opacity 0.45s ease;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 1;
}
.screen.active { opacity:1; pointer-events:auto; z-index:10; }
.screen.result-screen { justify-content: flex-start; padding-top: 40px; padding-bottom: 60px; }

/* Main Screen */
.main-icon { font-size:4rem; margin-bottom:8px; display:block; }
.main-title {
  font-family:'Black Han Sans',sans-serif;
  font-size: clamp(2rem,8vw,3.2rem);
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.main-sub { color:var(--text-dim); font-size:0.95rem; margin-bottom:36px; }
.mode-btns { display:flex; flex-direction:column; gap:14px; width:100%; max-width:360px; }
.mode-btn {
  display:flex; align-items:center; gap:14px;
  padding:18px 24px; border-radius:18px;
  border:2px solid var(--border);
  background: var(--surface);
  color:var(--text); font-size:1rem; font-weight:700;
  cursor:pointer; transition:all 0.25s;
  text-align:left;
  backdrop-filter: blur(10px);
}
.mode-btn:hover { border-color:var(--primary); background:var(--surface-hover); transform:translateY(-2px); }
.mode-btn:active { transform:translateY(0) scale(0.98); }
.mode-btn .btn-icon { font-size:1.8rem; }
.mode-btn .btn-info { flex:1; }
.mode-btn .btn-label { display:block; font-size:1.05rem; }
.mode-btn .btn-desc { display:block; font-size:0.78rem; color:var(--text-dim); font-weight:400; margin-top:2px; }
.privacy {
  margin-top:28px; font-size:0.75rem; color:var(--text-dim);
  text-align:center; line-height:1.6;
  max-width:320px;
}
.privacy::before { content:"🔒 "; }

/* Upload area */
.upload-area {
  width:100%; max-width:360px;
  border:2px dashed rgba(255,255,255,0.15);
  border-radius:20px; padding:48px 24px;
  text-align:center; cursor:pointer;
  transition:all 0.3s;
  background: var(--surface);
}
.upload-area:hover, .upload-area.dragover {
  border-color:var(--primary); background:rgba(102,126,234,0.08);
}
.upload-area .up-icon { font-size:3rem; display:block; margin-bottom:12px; }
.upload-area .up-text { color:var(--text-dim); font-size:0.9rem; }
.back-btn {
  position:absolute; top:20px; left:20px;
  background:none; border:none; color:var(--text-dim);
  font-size:1.2rem; cursor:pointer; padding:8px;
  transition:color 0.2s;
}
.back-btn:hover { color:var(--text); }

/* Question screens */
.q-step { font-size:0.8rem; color:var(--primary); font-weight:700; letter-spacing:2px; margin-bottom:8px; }
.q-title {
  font-family:'Black Han Sans',sans-serif;
  font-size:1.6rem; margin-bottom:28px; text-align:center;
}
.option-grid {
  display:grid; gap:12px; width:100%; max-width:360px;
}
.option-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.option-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.option-card {
  background:var(--surface); border:2px solid var(--border);
  border-radius:16px; padding:20px 12px;
  text-align:center; cursor:pointer;
  transition:all 0.25s; color:var(--text);
  backdrop-filter:blur(10px);
}
.option-card:hover { border-color:var(--primary); background:var(--surface-hover); }
.option-card.selected {
  border-color:var(--primary); background:rgba(102,126,234,0.2);
  transform:scale(0.95);
}
.option-card .opt-emoji { font-size:2rem; display:block; margin-bottom:6px; }
.option-card .opt-label { font-size:0.88rem; font-weight:600; }

/* Loading screen */
.loading-wrap { text-align:center; max-width:360px; }
.loading-icon { font-size:3.5rem; display:block; margin-bottom:20px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
.loading-title { font-family:'Black Han Sans',sans-serif; font-size:1.4rem; margin-bottom:24px; }
.progress-bar {
  width:100%; height:6px; background:rgba(255,255,255,0.1);
  border-radius:3px; overflow:hidden; margin-bottom:20px;
}
.progress-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--primary), var(--accent));
  border-radius:3px; transition:width 0.3s;
}
.loading-status {
  font-size:0.85rem; color:var(--text-dim);
  min-height:1.4em;
  transition:opacity 0.2s;
}
.loading-percent { font-family:'Black Han Sans',sans-serif; font-size:2rem; color:var(--primary); margin-bottom:16px; }

/* Result screen */
.result-container { max-width:420px; width:100%; }
.result-grade-badge {
  display:inline-block; padding:6px 18px;
  border-radius:20px; font-size:0.8rem; font-weight:900;
  letter-spacing:2px; margin-bottom:16px;
}
.grade-A { background:linear-gradient(135deg,#f093fb,#f5576c); color:#fff; }
.grade-B { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.grade-C { background:linear-gradient(135deg,#ffecd2,#fcb69f); color:#333; }
.grade-D { background:linear-gradient(135deg,#a8a8a8,#666); color:#fff; }
.result-emoji { font-size:5rem; display:block; margin-bottom:12px; animation:resultPop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes resultPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
.result-type {
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(1.8rem,6vw,2.4rem);
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:6px;
}
.result-subtitle { color:var(--text-dim); font-size:0.92rem; margin-bottom:32px; }

.section-label {
  font-size:0.72rem; font-weight:700; color:var(--text-dim);
  letter-spacing:2px; text-transform:uppercase;
  margin-bottom:16px; text-align:center;
}
.score-bars { margin-bottom:32px; }
.score-row {
  display:flex; align-items:center; gap:12px;
  margin-bottom:14px;
}
.score-label { width:50px; font-size:0.82rem; font-weight:700; color:var(--text-dim); text-align:right; }
.score-bar-bg {
  flex:1; height:10px; background:rgba(255,255,255,0.08);
  border-radius:5px; overflow:hidden; position:relative;
}
.score-bar-fill {
  height:100%; border-radius:5px; width:0%;
  transition: width 1.2s cubic-bezier(0.25,1,0.5,1);
}
.score-value {
  width:36px; font-family:'Black Han Sans',sans-serif;
  font-size:1.1rem; text-align:left;
}
.fill-hogam { background:linear-gradient(90deg,#ff6b6b,#ffa07a); }
.fill-sinloe { background:linear-gradient(90deg,#667eea,#64b5f6); }
.fill-hip { background:linear-gradient(90deg,#f093fb,#c471ed); }
.fill-geori { background:linear-gradient(90deg,#ffd93d,#f0932b); }

.desc-section { margin-bottom:28px; }
.desc-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 16px; margin-bottom:8px;
  background:var(--surface); border-radius:14px;
  font-size:0.88rem; line-height:1.5;
  opacity:0; transform:translateX(-10px);
  animation:slideInLeft 0.4s ease-out forwards;
}
.desc-item:nth-child(1){animation-delay:0.6s}
.desc-item:nth-child(2){animation-delay:0.8s}
.desc-item:nth-child(3){animation-delay:1s}
@keyframes slideInLeft { to{opacity:1;transform:translateX(0)} }
.desc-item .arrow { color:var(--primary); font-weight:700; flex-shrink:0; }

.tip-box {
  background: rgba(102,126,234,0.1);
  border:1px solid rgba(102,126,234,0.2);
  border-radius:16px; padding:18px 20px;
  margin-bottom:32px; font-size:0.88rem; line-height:1.6;
}
.tip-box .tip-icon { margin-right:6px; }

.share-btns {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  margin-bottom:12px;
}
.share-btn {
  padding:14px 12px; border-radius:14px;
  border:2px solid var(--border); background:var(--surface);
  color:var(--text); font-size:0.85rem; font-weight:700;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.share-btn:hover { border-color:var(--primary); background:var(--surface-hover); }
.share-btn:active { transform:scale(0.97); }
.action-btns { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
.action-btn {
  padding:16px; border-radius:14px; border:none;
  font-size:1rem; font-weight:700; cursor:pointer;
  transition:all 0.2s; text-align:center;
}
.action-btn:hover { transform:translateY(-2px); }
.action-btn:active { transform:translateY(0) scale(0.98); }
.btn-retry {
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;
}
.btn-compare { background:var(--surface); border:2px solid var(--border); color:var(--text); }
.btn-hub {
  background:none; border:none; color:var(--text-dim);
  font-size:0.82rem; margin-top:8px; cursor:pointer; padding:10px;
}
.btn-hub:hover { color:var(--text); }

/* Toast */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
  background:rgba(255,255,255,0.15); backdrop-filter:blur(20px);
  padding:12px 24px; border-radius:12px; font-size:0.88rem; font-weight:600;
  transition:transform 0.3s ease; z-index:999; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Confetti */
.confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:100; overflow:hidden; }
.confetti-piece {
  position:absolute; width:10px; height:10px;
  top:-20px; border-radius:2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* Mobile */
@media(max-width:480px) {
  .screen { padding:20px 16px; }
  .option-grid.cols-3 { grid-template-columns:1fr 1fr; }
  .result-emoji { font-size:4rem; }
}
</style>
</head>
<body>

<!-- MAIN -->
<div class="screen active" id="screenMain">
  <span class="main-icon">🧠</span>
  <h1 class="main-title">프사 인상 리포트</h1>
  <p class="main-sub">남들이 보는 내 첫인상은?</p>
  <div class="mode-btns">
    <button class="mode-btn" onclick="startUpload()">
      <span class="btn-icon">📷</span>
      <span class="btn-info">
        <span class="btn-label">사진 업로드하고 분석</span>
        <span class="btn-desc">이미지 밝기·색감·대비를 AI처럼 분석</span>
      </span>
    </button>
    <button class="mode-btn" onclick="startSelect()">
      <span class="btn-icon">🎭</span>
      <span class="btn-info">
        <span class="btn-label">사진 없이 유형 선택</span>
        <span class="btn-desc">3가지 질문으로 인상 분석</span>
      </span>
    </button>
  </div>
  <p class="privacy">이 서비스는 이미지를 서버에 업로드하지 않습니다.<br>모든 분석은 브라우저 내에서만 처리됩니다.</p>
</div>

<!-- UPLOAD -->
<div class="screen" id="screenUpload">
  <button class="back-btn" onclick="goMain()">← 뒤로</button>
  <label class="upload-area" id="uploadArea" for="fileInput">
    <span class="up-icon">📁</span>
    <span class="up-text">사진을 선택하거나 여기에 드래그하세요</span>
    <input type="file" id="fileInput" accept="image/*" hidden>
  </label>
</div>

<!-- Q1 -->
<div class="screen" id="screenQ1">
  <button class="back-btn" onclick="goMain()">← 뒤로</button>
  <div class="q-step">STEP 1 / 3</div>
  <div class="q-title">프사 유형을 골라주세요</div>
  <div class="option-grid cols-3" id="q1Grid">
    <button class="option-card" onclick="answer('type','selfie',this)"><span class="opt-emoji">🤳</span><span class="opt-label">셀카</span></button>
    <button class="option-card" onclick="answer('type','mirror',this)"><span class="opt-emoji">🪞</span><span class="opt-label">거울샷</span></button>
    <button class="option-card" onclick="answer('type','travel',this)"><span class="opt-emoji">✈️</span><span class="opt-label">여행사진</span></button>
    <button class="option-card" onclick="answer('type','group',this)"><span class="opt-emoji">👥</span><span class="opt-label">단체사진</span></button>
    <button class="option-card" onclick="answer('type','character',this)"><span class="opt-emoji">🎨</span><span class="opt-label">애니/캐릭터</span></button>
    <button class="option-card" onclick="answer('type','landscape',this)"><span class="opt-emoji">🏔️</span><span class="opt-label">풍경</span></button>
  </div>
</div>

<!-- Q2 -->
<div class="screen" id="screenQ2">
  <button class="back-btn" onclick="showScreen('screenQ1')">← 뒤로</button>
  <div class="q-step">STEP 2 / 3</div>
  <div class="q-title">표정은 어때요?</div>
  <div class="option-grid cols-2" id="q2Grid">
    <button class="option-card" onclick="answer('expression','neutral',this)"><span class="opt-emoji">😐</span><span class="opt-label">무표정</span></button>
    <button class="option-card" onclick="answer('expression','slight',this)"><span class="opt-emoji">🙂</span><span class="opt-label">살짝 웃음</span></button>
    <button class="option-card" onclick="answer('expression','big',this)"><span class="opt-emoji">😄</span><span class="opt-label">활짝 웃음</span></button>
    <button class="option-card" onclick="answer('expression','serious',this)"><span class="opt-emoji">🧐</span><span class="opt-label">진지함</span></button>
  </div>
</div>

<!-- Q3 -->
<div class="screen" id="screenQ3">
  <button class="back-btn" onclick="showScreen('screenQ2')">← 뒤로</button>
  <div class="q-step">STEP 3 / 3</div>
  <div class="q-title">배경 느낌은?</div>
  <div class="option-grid cols-2" id="q3Grid">
    <button class="option-card" onclick="answer('background','clean',this)"><span class="opt-emoji">✨</span><span class="opt-label">깔끔</span></button>
    <button class="option-card" onclick="answer('background','aesthetic',this)"><span class="opt-emoji">🌸</span><span class="opt-label">감성 필터</span></button>
    <button class="option-card" onclick="answer('background','dark',this)"><span class="opt-emoji">🌙</span><span class="opt-label">어두움</span></button>
    <button class="option-card" onclick="answer('background','bright',this)"><span class="opt-emoji">☀️</span><span class="opt-label">밝음</span></button>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="screenLoading">
  <div class="loading-wrap">
    <span class="loading-icon">🧠</span>
    <div class="loading-title">인상 분석 중...</div>
    <div class="loading-percent" id="loadPercent">0%</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="loading-status" id="loadStatus">준비 중…</div>
  </div>
</div>

<!-- RESULT -->
<div class="screen result-screen" id="screenResult">
  <div class="result-container" id="resultContainer"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<!-- CONFETTI -->
<div class="confetti-layer" id="confettiLayer"></div>

<script>
/* ========== CONSTANTS ========== */
const LOADING_MSGS = [
  "이미지 픽셀 분해 중…",
  "얼굴 대비 패턴 스캔 중…",
  "색온도 분석 중…",
  "밝기 분포 매핑 중…",
  "인상 매칭 알고리즘 적용 중…",
  "사회적 반응 예측 중…",
  "최종 리포트 생성 중…"
];

const SCORING = {
  type: {
    selfie:    {h:12, s:-5, p:3, g:-8},
    mirror:    {h:5,  s:-8, p:15,g:-3},
    travel:    {h:15, s:8,  p:10,g:-10},
    group:     {h:8,  s:12, p:-5,g:-15},
    character: {h:-5, s:-15,p:20,g:15},
    landscape: {h:3,  s:5,  p:8, g:12}
  },
  expression: {
    neutral: {h:-8, s:10, p:5,  g:15},
    slight:  {h:10, s:8,  p:3,  g:-10},
    big:     {h:18, s:3,  p:-5, g:-20},
    serious: {h:-5, s:15, p:8,  g:10}
  },
  background: {
    clean:     {h:5,  s:10, p:-3, g:3},
    aesthetic: {h:-3, s:-8, p:18, g:5},
    dark:      {h:-8, s:3,  p:12, g:10},
    bright:    {h:12, s:5,  p:-3, g:-8}
  }
};

const TYPES = [
  // A Grade
  {id:'datePass',    name:'소개팅 프리패스형', emoji:'💘', grade:'A', sub:'프사만으로 호감도 MAX',
   desc:['프사 하나로 "만나보고 싶다" 반응을 이끌어냄','자연스러운 밝은 인상이 강한 무기','소개팅 앱에서 우측 스와이프 확률 매우 높음'],
   tip:'지금 프사가 최적입니다. 바꾸지 마세요!'},
  {id:'sunshine',    name:'인간 햇살형', emoji:'☀️', grade:'A', sub:'보기만 해도 기분 좋아지는 프사',
   desc:['프사에서 따뜻한 에너지가 물리적으로 느껴짐','처음 보는 사람도 편하게 다가갈 수 있는 인상','단톡방에서 프사만으로 호감을 획득하는 타입'],
   tip:'따뜻함을 유지하면서 조금 더 힙한 배경을 쓰면 완벽!'},
  {id:'trustBomber', name:'신뢰 폭격기', emoji:'🛡️', grade:'A', sub:'비밀을 맡겨도 될 것 같은 인상',
   desc:['첫인상만으로 "괜찮은 사람"이라는 평가를 받음','그룹 프로젝트할 때 리더로 뽑힐 상','진중하면서도 안정감 있는 프사의 정석'],
   tip:'가끔 밝은 표정의 사진을 섞으면 호감도도 UP!'},

/* ========== STATE ========== */
let state = { mode:null, answers:{}, scores:null, resultType:null };

/* ========== SCREEN NAV ========== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.scrollTop = 0;
  requestAnimationFrame(() => el.classList.add('active'));
}
function goMain() {
  state = {mode:null, answers:{}, scores:null, resultType:null};
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  showScreen('screenMain');
}

/* ========== UPLOAD MODE ========== */
function startUpload() {
  state.mode = 'upload';
  showScreen('screenUpload');
}

const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if(fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if(!file.type.startsWith('image/')) { showToast('이미지 파일을 선택해주세요!'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const scores = analyzeImage(img);
      state.scores = scores;
      startLoading();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function analyzeImage(img) {
  const canvas = document.createElement('canvas');
  const size = 200;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;
  const n = data.length / 4;
  let tR=0,tG=0,tB=0,tL=0;
  const lums = [];
  for(let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2];
    tR+=r; tG+=g; tB+=b;
    const l = 0.299*r + 0.587*g + 0.114*b;
    tL+=l; lums.push(l);
  }
  const avgL = tL/n;
  const brightness = avgL / 255;
  const variance = lums.reduce((s,l) => s + (l-avgL)**2, 0) / n;
  const contrast = Math.sqrt(variance) / 128;
  const warmth = ((tR/n) - (tB/n)) / 255;
  const rand = () => Math.random()*10 - 5;

  const clamp = v => Math.max(20, Math.min(92, Math.round(v)));
  return {
    hogam:  clamp(50 + brightness*30 + warmth*15 + rand()),
    sinloe: clamp(50 + contrast*20 + brightness*10 + rand()),
    hip:    clamp(50 + (1-brightness)*15 + contrast*15 + rand()),
    geori:  clamp(50 - brightness*20 - warmth*15 + contrast*10 + rand())
  };
}

/* ========== SELECT MODE ========== */
function startSelect() {
  state.mode = 'select';
  showScreen('screenQ1');
}

function answer(q, val, el) {
  state.answers[q] = val;
  el.closest('.option-grid').querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(() => {
    if(q==='type') showScreen('screenQ2');
    else if(q==='expression') showScreen('screenQ3');
    else if(q==='background') {
      state.scores = calcSelectScores();
      startLoading();
    }
  }, 280);
}

function calcSelectScores() {
  let h=50, s=50, p=50, g=50;
  for(const [cat, val] of Object.entries(state.answers)) {
    const mod = SCORING[cat]?.[val];
    if(mod) { h+=mod.h; s+=mod.s; p+=mod.p; g+=mod.g; }
  }
  const rand = () => Math.random()*10 - 5;
  const clamp = v => Math.max(20, Math.min(92, Math.round(v)));
  return { hogam:clamp(h+rand()), sinloe:clamp(s+rand()), hip:clamp(p+rand()), geori:clamp(g+rand()) };
}

/* ========== LOADING ========== */
function startLoading() {
  showScreen('screenLoading');
  const fill = document.getElementById('progressFill');
  const pct = document.getElementById('loadPercent');
  const status = document.getElementById('loadStatus');
  let progress = 0;
  let msgIdx = 0;
  fill.style.width = '0%';

  const interval = setInterval(() => {
    progress += Math.random()*8 + 3;
    if(progress > 98) progress = 98;
    fill.style.width = progress + '%';
    pct.textContent = Math.round(progress) + '%';
    if(Math.random() < 0.35 && msgIdx < LOADING_MSGS.length) {
      status.textContent = LOADING_MSGS[msgIdx++];
    }
  }, 200);

  setTimeout(() => {
    clearInterval(interval);
    fill.style.width = '100%';
    pct.textContent = '100%';
    status.textContent = '분석 완료!';
    setTimeout(() => {
      state.resultType = determineType(state.scores);
      showResult();
    }, 400);
  }, 3000);
}

/* ========== TYPE DETERMINATION ========== */
function determineType(sc) {
  const eff = (sc.hogam + sc.sinloe + sc.hip + (100-sc.geori)) / 4;
  let grade;
  if(eff>=72) grade='A';
  else if(eff>=58) grade='B';
  else if(eff>=42) grade='C';
  else grade='D';

  const gt = TYPES.filter(t => t.grade === grade);
  const metrics = [{k:'hogam',v:sc.hogam},{k:'sinloe',v:sc.sinloe},{k:'hip',v:sc.hip},{k:'geori',v:sc.geori}];
  metrics.sort((a,b)=>b.v-a.v);
  const dom = metrics[0].k;
  const range = metrics[0].v - metrics[3].v;

  if(grade==='A') {
    if(dom==='hogam' && sc.hogam>=80) return gt.find(t=>t.id==='datePass') || gt[0];
    if(dom==='hogam' && sc.geori<=35) return gt.find(t=>t.id==='sunshine') || gt[0];
    if(dom==='sinloe') return gt.find(t=>t.id==='trustBomber') || gt[0];
    if(dom==='hip' && sc.hogam>=65) return gt.find(t=>t.id==='vibeArtist') || gt[0];
    if(dom==='hip') return gt.find(t=>t.id==='hipster') || gt[0];
    return gt.find(t=>t.id==='quietCharisma') || gt[0];
  }
  if(grade==='B') {
    if(dom==='sinloe' && sc.hogam>=60) return gt.find(t=>t.id==='warmSenior') || gt[0];
    if(dom==='hogam') return gt.find(t=>t.id==='secretCharm') || gt[0];
    if(dom==='sinloe') return gt.find(t=>t.id==='calmStrategist') || gt[0];
    if(dom==='geori') return gt.find(t=>t.id==='dmHesitate') || gt[0];
    if(range<=15) return gt.find(t=>t.id==='realFriend') || gt[0];
    return gt.find(t=>t.id==='safeDefault') || gt[0];
  }
  if(grade==='C') {
    if(dom==='hip' && sc.hip>=65) return gt.find(t=>t.id==='conceptOverload') || gt[0];
    if(dom==='geori' && sc.geori>=70) return gt.find(t=>t.id==='distanceGen') || gt[0];
    if(dom==='geori') return gt.find(t=>t.id==='shyInducer') || gt[0];
    if(range>=30) return gt.find(t=>t.id==='misunderstood') || gt[0];
    if(dom==='hip') return gt.find(t=>t.id==='emotionMystery') || gt[0];
    return gt.find(t=>t.id==='pokerFace') || gt[0];
  }
  // D
  if(sc.hip > sc.hogam + 15) return gt.find(t=>t.id==='filterOverload') || gt[0];
  if(dom==='geori') return gt.find(t=>t.id==='tooFar') || gt[0];
  if(sc.hogam<=30) return gt.find(t=>t.id==='noLight') || gt[0];
  if(sc.sinloe<=30) return gt.find(t=>t.id==='angleMiss') || gt[0];
  if(sc.hogam<=40 && sc.geori>=60) return gt.find(t=>t.id==='frozenFace') || gt[0];
  return gt.find(t=>t.id==='bgChaos') || gt[0];
}

      </div>
      <div class="score-row">
        <span class="score-label">거리감</span>
        <div class="score-bar-bg"><div class="score-bar-fill fill-geori" id="barGeori"></div></div>
        <span class="score-value" id="valGeori">0</span>
      </div>
    </div>

    <div class="section-label">남들이 보기엔</div>
    <div class="desc-section">
      ${type.desc.map(d => `<div class="desc-item"><span class="arrow">→</span><span>${d}</span></div>`).join('')}
    </div>

    <div class="tip-box">
      <span class="tip-icon">💡</span> <strong>개선 팁</strong><br>${type.tip}
    </div>

    <div class="section-label">공유하기</div>
    <div class="share-btns">
      <button class="share-btn" onclick="downloadCard(1080,1920)">📱 스토리용 저장</button>
      <button class="share-btn" onclick="downloadCard(1080,1080)">📸 피드용 저장</button>
    </div>
    <div class="share-btns">
      <button class="share-btn" onclick="copyLink()">🔗 링크 복사</button>
      <button class="share-btn" onclick="copyLink()">👥 친구랑 비교하기</button>
    </div>

    <div class="action-btns">
      <button class="action-btn btn-retry" onclick="goMain()">🔄 다시 하기</button>
      <button class="btn-hub" onclick="location.href='../'">← 다른 프로젝트 보기</button>
    </div>
  `;

  showScreen('screenResult');

  // Animate score bars
  requestAnimationFrame(() => {
    setTimeout(() => {
      animateBar('barHogam','valHogam', sc.hogam);
      animateBar('barSinloe','valSinloe', sc.sinloe);
      animateBar('barHip','valHip', sc.hip);
      animateBar('barGeori','valGeori', sc.geori);
    }, 200);
  });

  // Confetti for A grade
  if(type.grade === 'A') setTimeout(fireConfetti, 600);
}

function animateBar(barId, valId, target) {
  const bar = document.getElementById(barId);
  const val = document.getElementById(valId);
  bar.style.width = target + '%';
  // Count up number
  let cur = 0;
  const step = Math.max(1, Math.floor(target / 30));
  const timer = setInterval(() => {
    cur += step;
    if(cur >= target) { cur = target; clearInterval(timer); }
    val.textContent = cur;
  }, 30);
}

/* ========== CONFETTI ========== */
function fireConfetti() {
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#667eea','#f093fb','#f5576c','#ffd93d','#2ecc71','#3498db','#ff6b6b'];
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = Math.random()*0.5 + 's';
    el.style.width = (6 + Math.random()*8) + 'px';
    el.style.height = (6 + Math.random()*8) + 'px';
    layer.appendChild(el);
  }
  setTimeout(() => layer.innerHTML = '', 5000);
}

/* ========== SHARE CARD ========== */
function downloadCard(w, h) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const sc = state.scores;
  const type = state.resultType;
  const isStory = h > w;

  // Background gradient
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,'#0a0a2e');
  grad.addColorStop(0.5,'#1a1040');
  grad.addColorStop(1,'#0a1a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // Decorative circles
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#667eea';
  ctx.beginPath(); ctx.arc(w*0.8, h*0.15, w*0.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f093fb';
  ctx.beginPath(); ctx.arc(w*0.2, h*0.85, w*0.3, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  const cx = w/2;
  const scale = w / 1080;

  if(isStory) {
    // Story layout
    ctx.fillStyle = '#888';
    ctx.font = `${28*scale}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('남들이 보는 내 첫인상은?', cx, 180*scale);

    ctx.font = `${120*scale}px serif`;
    ctx.fillText(type.emoji, cx, 450*scale);

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${72*scale}px "Black Han Sans","Noto Sans KR",sans-serif`;
    ctx.fillText(type.name, cx, 600*scale);

    ctx.fillStyle = '#aaa';
    ctx.font = `${32*scale}px "Noto Sans KR",sans-serif`;
    ctx.fillText(type.sub, cx, 680*scale);

    // Score bars
    const barY = 820*scale;
    const barW = 600*scale;
    const barH = 24*scale;
    const barX = (w - barW) / 2;
    const gap = 90*scale;
    const labels = ['호감도','신뢰감','힙함','거리감'];
    const vals = [sc.hogam, sc.sinloe, sc.hip, sc.geori];
    const barColors = ['#ff6b6b','#667eea','#f093fb','#ffd93d'];

    labels.forEach((label, i) => {
      const y = barY + i * gap;
      ctx.fillStyle = '#888';
      ctx.font = `bold ${28*scale}px "Noto Sans KR",sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(label, barX, y);

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${36*scale}px "Black Han Sans","Noto Sans KR",sans-serif`;
      ctx.textAlign = 'right';
      ctx.fillText(vals[i], barX + barW, y);

      const by = y + 12*scale;
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      roundRect(ctx, barX, by, barW, barH, barH/2);
      ctx.fillStyle = barColors[i];
      roundRect(ctx, barX, by, barW * vals[i]/100, barH, barH/2);
    });

    // CTA
    ctx.fillStyle = '#666';
    ctx.font = `${28*scale}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('너도 해보고 결과 공유해봐 👀', cx, 1600*scale);

    ctx.fillStyle = '#555';
    ctx.font = `${24*scale}px "Noto Sans KR",sans-serif`;
    ctx.fillText('🧠 프사 인상 리포트', cx, 1700*scale);

  } else {
    // Feed layout (square)
    ctx.fillStyle = '#888';
    ctx.font = `${24*scale}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('남들이 보는 내 첫인상은?', cx, 100*scale);

    ctx.font = `${90*scale}px serif`;
    ctx.fillText(type.emoji, cx, 280*scale);

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${64*scale}px "Black Han Sans","Noto Sans KR",sans-serif`;
    ctx.fillText(type.name, cx, 400*scale);

    ctx.fillStyle = '#aaa';
    ctx.font = `${26*scale}px "Noto Sans KR",sans-serif`;
    ctx.fillText(type.sub, cx, 460*scale);

    // Scores in 2x2 grid
    const labels = ['호감도','신뢰감','힙함','거리감'];
    const vals = [sc.hogam, sc.sinloe, sc.hip, sc.geori];
    const positions = [[w*0.28,600*scale],[w*0.72,600*scale],[w*0.28,740*scale],[w*0.72,740*scale]];
    const barColors = ['#ff6b6b','#667eea','#f093fb','#ffd93d'];

    positions.forEach(([px,py], i) => {
      ctx.fillStyle = barColors[i];
      ctx.font = `bold ${56*scale}px "Black Han Sans","Noto Sans KR",sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(vals[i], px, py);
      ctx.fillStyle = '#888';
      ctx.font = `${24*scale}px "Noto Sans KR",sans-serif`;
      ctx.fillText(labels[i], px, py + 36*scale);
    });

    ctx.fillStyle = '#666';
    ctx.font = `${24*scale}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('너도 해보고 결과 공유해봐 👀', cx, 920*scale);

    ctx.fillStyle = '#555';
    ctx.font = `${22*scale}px "Noto Sans KR",sans-serif`;
    ctx.fillText('🧠 프사 인상 리포트', cx, 980*scale);
  }

  // Download
  const link = document.createElement('a');
  link.download = `프사인상리포트_${isStory?'스토리':'피드'}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('이미지가 저장되었습니다!');
}

function roundRect(ctx, x, y, w, h, r) {
  if(w <= 0) return;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

/* ========== UTILS ========== */
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('링크가 복사되었습니다! 친구에게 공유해보세요');
  }).catch(() => {
    showToast('링크를 복사하지 못했습니다');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
